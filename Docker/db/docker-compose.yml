version: "3"
services:
  db:
    image: postgres:16
    restart: always
    volumes:
     - ./data/db:/var/lib/postgresql/data
    ports:
    - 5432:5432
    environment:
      - POSTGRES_DB=aarsh
      - POSTGRES_USER=aarsh
      - POSTGRES_PASSWORD=aarsh
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080